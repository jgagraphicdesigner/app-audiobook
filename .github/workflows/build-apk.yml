name: Build APK

on:
  push:
    branches: [ android-app ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download Gradle wrapper jar
        run: |
          mkdir -p gradle/wrapper
          curl -L "https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar || \
          wget -q "https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -O gradle/wrapper/gradle-wrapper.jar

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk PositivelyGeared.apk

      - name: Create/Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: Positively Geared Audiobook App
          body: |
            ## 📱 Positively Geared Audiobook — Android App

            **How to install:**
            1. Tap **PositivelyGeared.apk** below to download
            2. Open the downloaded file on your Android phone
            3. Tap **Install** (if prompted, allow installation from unknown sources in Settings)
            4. Open the app — all chapters stream and can be saved for offline listening

            Built automatically from the latest source code.
          files: PositivelyGeared.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
