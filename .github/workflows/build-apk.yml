name: Build APK
on:permissions: contents: write
  push:
    branches: [ android-app ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - name: Get Gradle wrapper jar
        run: |
          mkdir -p gradle/wrapper
          curl -L "https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar" -o gradle/wrapper/gradle-wrapper.jar
      - run: chmod +x gradlew
      - run: ./gradlew assembleDebug --no-daemon
      - run: cp app/build/outputs/apk/debug/app-debug.apk PositivelyGeared.apk
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PositivelyGeared-APK
          path: PositivelyGeared.apk
      - name: Delete old release
        run: gh release delete apk-latest --yes 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Delete old tag
        run: git push origin :refs/tags/apk-latest 2>/dev/null || true
      - name: Create new release
        run: |
          gh release create apk-latest PositivelyGeared.apk \
            --title "Positively Geared Audiobook App" \
            --notes "Download PositivelyGeared.apk and install on your Android phone."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
