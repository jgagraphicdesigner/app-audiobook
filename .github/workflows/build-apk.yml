name: Build APK
on:
  push:
    branches: [ android-app ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - name: Get Gradle wrapper jar
        run: |
          mkdir -p gradle/wrapper
          curl -L "https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar" -o gradle/wrapper/gradle-wrapper.jar
      - run: chmod +x gradlew
      - run: ./gradlew assembleDebug --no-daemon
      - run: cp app/build/outputs/apk/debug/app-debug.apk PositivelyGeared.apk
      - uses: actions/upload-artifact@v4
        with:
          name: PositivelyGeared-APK
          path: PositivelyGeared.apk
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: Positively Geared Audiobook App
          body: "Download PositivelyGeared.apk and install on your Android phone"
          files: PositivelyGeared.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
