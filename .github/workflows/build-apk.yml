name: Build APK

on:
  push:
    branches: [ android-app ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android SDK
        run: |
          sudo apt-get install -y wget unzip
          mkdir -p $HOME/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/cmdtools.zip
          unzip -q /tmp/cmdtools.zip -d $HOME/android-sdk/cmdline-tools
          mv $HOME/android-sdk/cmdline-tools/cmdline-tools $HOME/android-sdk/cmdline-tools/latest
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH
          yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=$HOME/android-sdk "platform-tools" "platforms;android-34" "build-tools;34.0.0" 2>/dev/null

      - name: Get Gradle wrapper
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle
          export PATH="/tmp/gradle/gradle-8.4/bin:$PATH"
          gradle wrapper --gradle-version 8.4
          chmod +x gradlew

      - name: Build Debug APK
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk PositivelyGeared.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: PositivelyGeared-APK
          path: PositivelyGeared.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: Positively Geared Audiobook App
          body: |
            ## Positively Geared Audiobook — Android App
            Tap **PositivelyGeared.apk** to download and install on your Android phone.
            **Install steps:** Download → Open file → Tap Install → Allow unknown sources if asked
          files: PositivelyGeared.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
